# k8s/deployment.yaml
# ============================================
# Kubernetes Deployment Manifests
# Predictive Maintenance Platform
# ============================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: predmaint-dashboard
  labels:
    app: predmaint-dashboard
spec:
  replicas: 2
  selector:
    matchLabels:
      app: predmaint-dashboard
  template:
    metadata:
      labels:
        app: predmaint-dashboard
    spec:
      containers:
      - name: dashboard
        image: predmaint/dashboard:latest
        ports:
        - containerPort: 8501
        env:
        - name: DB_HOST
          value: "timescaledb-service"
        - name: DB_PORT
          value: "5432"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /_stcore/health
            port: 8501
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: predmaint-dashboard-service
spec:
  selector:
    app: predmaint-dashboard
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8501
  type: LoadBalancer
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: predmaint-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: predmaint-dashboard
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70