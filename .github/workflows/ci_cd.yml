# .github/workflows/ci_cd.yml
# ============================================
# GitHub Actions CI/CD Pipeline
# ============================================

name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  # ==========================================
  # Job 1: Lint & Test
  # ==========================================
  test:
    runs-on: ubuntu-latest
    name: Lint & Test

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest pandas numpy

    - name: Lint with ruff
      run: |
        ruff check src/ --ignore E501,F401
      continue-on-error: true

    - name: Run tests
      run: |
        pytest tests/ -v --tb=short
      continue-on-error: true

  # ==========================================
  # Job 2: Build Docker Image
  # ==========================================
  build:
    runs-on: ubuntu-latest
    needs: test
    name: Build Docker Image

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/predmaint:latest
          ${{ secrets.DOCKER_USERNAME }}/predmaint:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # ==========================================
  # Job 3: Deploy
  # ==========================================
  deploy:
    runs-on: ubuntu-latest
    needs: build
    name: Deploy to Cloud
    if: github.ref == 'refs/heads/master'

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy notification
      run: |
        echo "✅ Deployment triggered!"
        echo "Image: ${{ secrets.DOCKER_USERNAME }}/predmaint:${{ github.sha }}"